name: Test Skill

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      NZ|        run: npm install
      
      ZV|        run: node tests/validate.js
        run: npm test
      
      - name: Check skill syntax
        run: |
          echo "Checking SKILL.md exists..."
          test -f SKILL.md
          
          echo "Checking README.md exists..."
          test -f README.md
          
          echo "Checking required sections..."
          grep -q "## 🎯 Usage" SKILL.md
          grep -q "## 🔄 Automatic Workflow" SKILL.md
          grep -q "## 🔑 Key Rules" SKILL.md
      
      - name: Validate package.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"
          echo "package.json is valid JSON"
      
      - name: Check sub-skills references
        run: |
          echo "Checking sub-skills are referenced..."
          grep -q "planning-with-files" SKILL.md
          grep -q "test-driven-development" SKILL.md
          grep -q "verification-before-completion" SKILL.md
